trigger:
  branches:
    include:
      - main

variables:
  - group: devops-project-secrets
  - name: IMAGE_TAG
    value: $(Build.BuildId)

stages:

- stage: Build
  displayName: 'Build & Push Images'
  jobs:
  - job: BuildAndPush
    pool:
      name: Default
    steps:
    - task: Docker@2
      displayName: 'Build & Push api-gateway'
      inputs:
        containerRegistry: 'acr-connection'
        repository: 'api-gateway'
        command: 'buildAndPush'
        Dockerfile: 'services/api-gateway/Dockerfile'
        tags: |
          $(IMAGE_TAG)
          latest

    - task: Docker@2
      displayName: 'Build & Push auth-service'
      inputs:
        containerRegistry: 'acr-connection'
        repository: 'auth-service'
        command: 'buildAndPush'
        Dockerfile: 'services/auth-service/Dockerfile'
        tags: |
          $(IMAGE_TAG)
          latest

    - task: Docker@2
      displayName: 'Build & Push data-service'
      inputs:
        containerRegistry: 'acr-connection'
        repository: 'data-service'
        command: 'buildAndPush'
        Dockerfile: 'services/data-service/Dockerfile'
        tags: |
          $(IMAGE_TAG)
          latest

- stage: CodeQuality
  displayName: 'SonarQube Code Scan'
  dependsOn: Build
  jobs:
  - job: SonarScan
    pool:
      name: Default
    steps:
    - script: |
        curl -sSLo sonar-scanner.zip \
          https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
        unzip -q sonar-scanner.zip
        export PATH="$PWD/sonar-scanner-5.0.1.3006-linux/bin:$PATH"
        sonar-scanner \
          -Dsonar.projectKey=$(SONAR_PROJECT_KEY) \
          -Dsonar.sources=. \
          -Dsonar.host.url=$(SONAR_HOST_URL) \
          -Dsonar.login=$(SONAR_TOKEN)
      displayName: 'Run SonarQube Scanner'

- stage: SecurityScan
  displayName: 'Trivy Security Scan'
  dependsOn: Build
  jobs:
  - job: TrivyScan
    pool:
      name: Default
    steps:
    - script: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b $HOME/bin
        export PATH="$HOME/bin:$PATH"
      displayName: 'Install Trivy'

    - task: AzureCLI@2
      displayName: 'Scan all images'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(ACR_NAME)
          for SERVICE in api-gateway auth-service data-service; do
            echo "======= Scanning $SERVICE ======="
            export PATH="$HOME/bin:$PATH"
              trivy image \
              --severity HIGH,CRITICAL \
              --no-progress \
              $(ACR_NAME).azurecr.io/$SERVICE:$(IMAGE_TAG) || true
          done

- stage: DeployStaging
  displayName: 'Deploy to Staging'
  dependsOn:
    - CodeQuality
    - SecurityScan
  condition: succeeded()
  jobs:
  - deployment: HelmDeployStaging
    pool:
      name: Default
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Helm deploy to staging'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials \
                  --resource-group $(AKS_RESOURCE_GROUP) \
                  --name $(AKS_CLUSTER) \
                  --overwrite-existing
                kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
                for SERVICE in api-gateway auth-service data-service; do
                  helm upgrade --install $SERVICE ./helm/$SERVICE \
                    --namespace staging \
                    --set image.tag=$(IMAGE_TAG) \
                    --set image.repository=$(ACR_NAME).azurecr.io/$SERVICE \
                    --wait --timeout 5m
                done
                echo "=== Staging pods ==="
                kubectl get pods -n staging
                echo "=== Staging HPA ==="
                kubectl get hpa -n staging

- stage: DeployProd
  displayName: 'Deploy to Production'
  dependsOn: DeployStaging
  condition: succeeded()
  jobs:
  - deployment: HelmDeployProd
    pool:
      name: Default
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Helm deploy to production'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials \
                  --resource-group $(AKS_RESOURCE_GROUP) \
                  --name $(AKS_CLUSTER) \
                  --overwrite-existing
                kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -
                for SERVICE in api-gateway auth-service data-service; do
                  helm upgrade --install $SERVICE ./helm/$SERVICE \
                    --namespace prod \
                    --set image.tag=$(IMAGE_TAG) \
                    --set image.repository=$(ACR_NAME).azurecr.io/$SERVICE \
                    --wait --timeout 5m
                done
                echo "=== Production pods ==="
                kubectl get pods -n prod
                echo "=== Production HPA ==="
                kubectl get hpa -n prod

